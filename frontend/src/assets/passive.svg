<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>

  <!-- Vm label on top stub -->
  <text x="50" y="11" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="black">Vm</text>
  <line x1="50" y1="13" x2="50" y2="22" stroke="black" stroke-width="2"/>

  <!-- Top rail -->
  <line x1="25" y1="22" x2="75" y2="22" stroke="black" stroke-width="2"/>

  <!-- Left vertical stubs (resistor) -->
  <line x1="25" y1="22" x2="25" y2="32" stroke="black" stroke-width="2"/>
  <!-- Resistor zigzag: center=25, body y=32..64 -->
  <polyline points="25,32 33,37 17,45 33,53 17,61 25,66"
            fill="none" stroke="black" stroke-width="2" stroke-linejoin="miter"/>
  <line x1="25" y1="66" x2="25" y2="78" stroke="black" stroke-width="2"/>

  <!-- Right vertical stubs (capacitor) -->
  <line x1="75" y1="22" x2="75" y2="43" stroke="black" stroke-width="2"/>
  <!-- Capacitor plates -->
  <line x1="63" y1="43" x2="87" y2="43" stroke="black" stroke-width="2.5"/>
  <line x1="63" y1="53" x2="87" y2="53" stroke="black" stroke-width="2.5"/>
  <line x1="75" y1="53" x2="75" y2="78" stroke="black" stroke-width="2"/>

  <!-- Bottom rail -->
  <line x1="25" y1="78" x2="75" y2="78" stroke="black" stroke-width="2"/>

  <!-- Bottom stub to ground -->
  <line x1="50" y1="78" x2="50" y2="83" stroke="black" stroke-width="2"/>

  <!-- Ground symbol -->
  <line x1="37" y1="83" x2="63" y2="83" stroke="black" stroke-width="2"/>
  <line x1="42" y1="88" x2="58" y2="88" stroke="black" stroke-width="2"/>
  <line x1="47" y1="93" x2="53" y2="93" stroke="black" stroke-width="2"/>
</svg>
