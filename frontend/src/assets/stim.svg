<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>

  <!-- Cell shifted +10 right from previous (soma cx 52→62) -->

  <!-- Soma -->
  <circle cx="62" cy="62" r="11" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Dendritic trunk -->
  <line x1="62" y1="51" x2="62" y2="45" stroke="black" stroke-width="2"/>

  <!-- Tier 1 branches -->
  <line x1="62" y1="45" x2="50" y2="35" stroke="black" stroke-width="2"/>
  <line x1="62" y1="45" x2="74" y2="35" stroke="black" stroke-width="2"/>

  <!-- Tier 2 branches -->
  <line x1="50" y1="35" x2="44" y2="22" stroke="black" stroke-width="1.5"/>
  <line x1="50" y1="35" x2="56" y2="22" stroke="black" stroke-width="1.5"/>
  <line x1="74" y1="35" x2="68" y2="22" stroke="black" stroke-width="1.5"/>
  <line x1="74" y1="35" x2="80" y2="22" stroke="black" stroke-width="1.5"/>

  <!-- Axon: straight down from soma, short right turn, arrowhead -->
  <line x1="62" y1="73" x2="62" y2="84" stroke="black" stroke-width="2"/>
  <line x1="62" y1="84" x2="76" y2="84" stroke="black" stroke-width="2"/>
  <polygon points="76,80 76,88 86,84" fill="black"/>

  <!-- Lightning bolt polygon — geometry left for user to adjust -->
  <polygon points="6,35 15,17 32,35 30,38 53,55 26,46 28,43"
           fill="none" stroke="black" stroke-width="2.5"
           stroke-linejoin="miter"/>
</svg>
