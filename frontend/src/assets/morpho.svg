<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>

  <!-- Cell body -->
  <circle cx="50" cy="63" r="10" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Dendritic trunk -->
  <line x1="50" y1="53" x2="50" y2="47" stroke="black" stroke-width="2"/>

  <!-- Tier 1 branches -->
  <line x1="50" y1="47" x2="28" y2="38" stroke="black" stroke-width="2"/>
  <line x1="50" y1="47" x2="72" y2="38" stroke="black" stroke-width="2"/>

  <!-- Tier 2 branches -->
  <line x1="28" y1="38" x2="16" y2="27" stroke="black" stroke-width="1.5"/>
  <line x1="28" y1="38" x2="40" y2="27" stroke="black" stroke-width="1.5"/>
  <line x1="72" y1="38" x2="60" y2="27" stroke="black" stroke-width="1.5"/>
  <line x1="72" y1="38" x2="84" y2="27" stroke="black" stroke-width="1.5"/>

  <!-- Tier 3 branches -->
  <line x1="16" y1="27" x2="8"  y2="16" stroke="black" stroke-width="1"/>
  <line x1="16" y1="27" x2="24" y2="16" stroke="black" stroke-width="1"/>
  <line x1="40" y1="27" x2="32" y2="16" stroke="black" stroke-width="1"/>
  <line x1="40" y1="27" x2="48" y2="16" stroke="black" stroke-width="1"/>
  <line x1="60" y1="27" x2="52" y2="16" stroke="black" stroke-width="1"/>
  <line x1="60" y1="27" x2="68" y2="16" stroke="black" stroke-width="1"/>
  <line x1="84" y1="27" x2="76" y2="16" stroke="black" stroke-width="1"/>
  <line x1="84" y1="27" x2="92" y2="16" stroke="black" stroke-width="1"/>

  <!-- Axon: down from soma, right turn, arrowhead -->
  <line x1="50" y1="73" x2="50" y2="87" stroke="black" stroke-width="2"/>
  <line x1="50" y1="87" x2="78" y2="87" stroke="black" stroke-width="2"/>
  <polygon points="78,83 78,91 88,87" fill="black"/>
</svg>
