<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>

  <!-- Socket face plate -->
  <rect x="5" y="26" width="43" height="50" rx="3"
        fill="white" stroke="black" stroke-width="2"/>
  <!-- Holes in triangle: top one (ground) slightly larger -->
  <circle cx="25" cy="39" r="7"   fill="black"/>
  <circle cx="14" cy="64" r="5.5" fill="black"/>
  <circle cx="36" cy="64" r="5.5" fill="black"/>

  <!-- Plug body -->
  <rect x="68" y="30" width="27" height="40"
        fill="white" stroke="black" stroke-width="2"/>
  <!-- Two flat blade pins: outline only, extending left from plug body -->
  <rect x="52" y="38" width="16" height="4"
        fill="white" stroke="black" stroke-width="1.5"/>
  <rect x="52" y="58" width="16" height="4"
        fill="white" stroke="black" stroke-width="1.5"/>
</svg>
