<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 70">
  <defs>
    <radialGradient id="sg" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#e8e8e8"/>
      <stop offset="45%"  stop-color="#909090"/>
      <stop offset="100%" stop-color="#383838"/>
    </radialGradient>
    <!-- vertical gradient used for all dendrite strokes (userSpace coords cover full icon height) -->
    <linearGradient id="dg" x1="0" y1="0" x2="0" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#d0d0d0"/>
      <stop offset="50%"  stop-color="#808080"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
  </defs>
  <!-- upper branch -->
  <line x1="60" y1="35" x2="100" y2="10" stroke="url(#dg)" stroke-width="10" stroke-linecap="round"/>
  <!-- lower branch -->
  <line x1="60" y1="35" x2="100" y2="60" stroke="url(#dg)" stroke-width="10" stroke-linecap="round"/>
  <!-- trunk -->
  <line x1="26" y1="35" x2="64" y2="35" stroke="url(#dg)" stroke-width="12" stroke-linecap="round"/>
  <!-- soma sphere -->
  <circle cx="20" cy="35" r="18" fill="url(#sg)"/>
  <ellipse cx="14" cy="27" rx="4.5" ry="3" fill="white" opacity="0.35"/>
</svg>
