<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>

  <defs>
    <radialGradient id="sg3" cx="30%" cy="28%" r="65%" fx="25%" fy="22%">
      <stop offset="0%"   stop-color="white"/>
      <stop offset="50%"  stop-color="#ccc"/>
      <stop offset="100%" stop-color="#444"/>
    </radialGradient>
    <linearGradient id="tg3" x1="47" y1="0" x2="53" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
    <linearGradient id="lg3" x1="48" y1="47" x2="52" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#777"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <linearGradient id="rg3" x1="52" y1="47" x2="48" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#777"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
  </defs>

  <!-- ── PERSPECTIVE BOX WIREFRAME ─────────────────────────────────────
       Front frame: (5,5)–(95,5)–(95,95)–(5,95)  [5% margin each side]
       Back face:   (27,27)–(73,27)–(73,73)–(27,73)  [centered]
       VP = (50,50); all four depth edges have slope ±1.              -->

  <!-- Front frame -->
  <line x1="5"  y1="5"  x2="95" y2="5"  stroke="#aaa" stroke-width="1"/>
  <line x1="5"  y1="5"  x2="5"  y2="95" stroke="#aaa" stroke-width="1"/>
  <line x1="95" y1="5"  x2="95" y2="95" stroke="#aaa" stroke-width="1"/>
  <line x1="5"  y1="95" x2="95" y2="95" stroke="#aaa" stroke-width="1"/>
  <!-- Four depth edges -->
  <line x1="5"  y1="5"  x2="27" y2="27" stroke="#aaa" stroke-width="1"/>
  <line x1="95" y1="5"  x2="73" y2="27" stroke="#aaa" stroke-width="1"/>
  <line x1="5"  y1="95" x2="27" y2="73" stroke="#aaa" stroke-width="1"/>
  <line x1="95" y1="95" x2="73" y2="73" stroke="#aaa" stroke-width="1"/>
  <!-- Back face -->
  <line x1="27" y1="27" x2="73" y2="27" stroke="#aaa" stroke-width="1"/>
  <line x1="27" y1="27" x2="27" y2="73" stroke="#aaa" stroke-width="1"/>
  <line x1="73" y1="27" x2="73" y2="73" stroke="#aaa" stroke-width="1"/>
  <line x1="27" y1="73" x2="73" y2="73" stroke="#aaa" stroke-width="1"/>

  <!-- ── GRID ON BACK WALL (orthogonal) ─────────────────────────────
       Wall x=27–73, y=27–73 (46×46).
       Verticals at x=39,50,61; horizontals at y=39,50,61.          -->
  <line x1="39" y1="27" x2="39" y2="73" stroke="#ccc" stroke-width="0.6"/>
  <line x1="50" y1="27" x2="50" y2="73" stroke="#ccc" stroke-width="0.6"/>
  <line x1="61" y1="27" x2="61" y2="73" stroke="#ccc" stroke-width="0.6"/>
  <line x1="27" y1="39" x2="73" y2="39" stroke="#ccc" stroke-width="0.6"/>
  <line x1="27" y1="50" x2="73" y2="50" stroke="#ccc" stroke-width="0.6"/>
  <line x1="27" y1="61" x2="73" y2="61" stroke="#ccc" stroke-width="0.6"/>

  <!-- ── GRID ON LEFT WALL ──────────────────────────────────────────
       Quad: (5,5)–(27,27)–(27,73)–(5,95)
       Cross-lines at t=¼,½,¾ of front-left → back-left edges:
         (5,28)→(27,39)   (5,50)→(27,50)   (5,73)→(27,62)
       Depth lines at s=⅓,⅔ of the top/bottom diagonal edges
       (these are vertical since both diagonals have equal Δx):
         (12,12)→(12,88)   (20,20)→(20,80)                          -->
  <line x1="5"  y1="28" x2="27" y2="39" stroke="#ccc" stroke-width="0.6"/>
  <line x1="5"  y1="50" x2="27" y2="50" stroke="#ccc" stroke-width="0.6"/>
  <line x1="5"  y1="73" x2="27" y2="62" stroke="#ccc" stroke-width="0.6"/>
  <line x1="12" y1="12" x2="12" y2="88" stroke="#ccc" stroke-width="0.6"/>
  <line x1="20" y1="20" x2="20" y2="80" stroke="#ccc" stroke-width="0.6"/>

  <!-- ── GRID ON RIGHT WALL ─────────────────────────────────────────
       Quad: (95,5)–(73,27)–(73,73)–(95,95)  — mirror of left wall.
       Cross-lines: (95,28)→(73,39)  (95,50)→(73,50)  (95,73)→(73,62)
       Depth lines: (88,12)→(88,88)  (80,20)→(80,80)                -->
  <line x1="95" y1="28" x2="73" y2="39" stroke="#ccc" stroke-width="0.6"/>
  <line x1="95" y1="50" x2="73" y2="50" stroke="#ccc" stroke-width="0.6"/>
  <line x1="95" y1="73" x2="73" y2="62" stroke="#ccc" stroke-width="0.6"/>
  <line x1="88" y1="12" x2="88" y2="88" stroke="#ccc" stroke-width="0.6"/>
  <line x1="80" y1="20" x2="80" y2="80" stroke="#ccc" stroke-width="0.6"/>

  <!-- ── GRID ON TOP FACE ───────────────────────────────────────────
       Quad: (5,5)–(95,5)–(73,27)–(27,27)
       Cross-lines (horizontal) at t=¼,½,¾ of left/right diagonals:
         (11,11)→(90,11)   (16,16)→(84,16)   (22,22)→(79,22)
       Convergence lines toward VP(50,50), at k=¼,½,¾ of front edge:
         (28,5)→(39,27)   (50,5)→(50,27)   (73,5)→(62,27)          -->
  <line x1="11" y1="11" x2="90" y2="11" stroke="#ccc" stroke-width="0.6"/>
  <line x1="16" y1="16" x2="84" y2="16" stroke="#ccc" stroke-width="0.6"/>
  <line x1="22" y1="22" x2="79" y2="22" stroke="#ccc" stroke-width="0.6"/>
  <line x1="28" y1="5"  x2="39" y2="27" stroke="#ccc" stroke-width="0.6"/>
  <line x1="50" y1="5"  x2="50" y2="27" stroke="#ccc" stroke-width="0.6"/>
  <line x1="73" y1="5"  x2="62" y2="27" stroke="#ccc" stroke-width="0.6"/>

  <!-- ── GRID ON FLOOR ─────────────────────────────────────────────
       Quad: (5,95)–(95,95)–(73,73)–(27,73)  — mirror of top face.
       Cross-lines (horizontal) at t=¼,½,¾:
         (11,90)→(90,90)   (16,84)→(84,84)   (22,79)→(79,79)
       Convergence lines toward VP(50,50), at k=¼,½,¾ of front edge:
         (28,95)→(39,73)   (50,95)→(50,73)   (73,95)→(62,73)       -->
  <line x1="11" y1="90" x2="90" y2="90" stroke="#ccc" stroke-width="0.6"/>
  <line x1="16" y1="84" x2="84" y2="84" stroke="#ccc" stroke-width="0.6"/>
  <line x1="22" y1="79" x2="79" y2="79" stroke="#ccc" stroke-width="0.6"/>
  <line x1="28" y1="95" x2="39" y2="73" stroke="#ccc" stroke-width="0.6"/>
  <line x1="50" y1="95" x2="50" y2="73" stroke="#ccc" stroke-width="0.6"/>
  <line x1="73" y1="95" x2="62" y2="73" stroke="#ccc" stroke-width="0.6"/>

  <!-- ── CELL (shaded, same geometry as 3D_new2.svg) ───────────────
       Drawn last so it occludes all grid lines.                     -->

  <!-- Left branch cylinder -->
  <polygon points="52,45 29,14 27,14 48,47"
           fill="url(#lg3)" stroke="black" stroke-width="1.5"/>
  <!-- Right branch cylinder -->
  <polygon points="48,45 71,14 73,14 52,47"
           fill="url(#rg3)" stroke="black" stroke-width="1.5"/>
  <!-- Trunk cylinder -->
  <polygon points="47,56 53,56 52,46 48,46"
           fill="url(#tg3)" stroke="black" stroke-width="1.5"/>
  <!-- Soma sphere -->
  <ellipse cx="50" cy="68" rx="16" ry="12"
           fill="url(#sg3)" stroke="black" stroke-width="2"/>
  <!-- Equatorial ring: front solid, back dashed gray -->
  <path d="M 34,68 A 16,4 0 0,1 66,68" fill="none" stroke="black" stroke-width="1.5"/>
  <path d="M 34,68 A 16,4 0 0,0 66,68" fill="none" stroke="#999" stroke-width="1.5"
        stroke-dasharray="3,3"/>
  <!-- Axon: kept within box (max y=87) -->
  <line x1="50" y1="80" x2="50" y2="84" stroke="black" stroke-width="2"/>
  <line x1="50" y1="84" x2="61" y2="84" stroke="black" stroke-width="2"/>
  <polygon points="61,81 61,87 68,84" fill="black"/>
</svg>
